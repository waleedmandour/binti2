# .github/workflows/build.yml
# Binti2 APK Build Workflow
# Manually triggerable workflow to build app-debug.apk

name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'app/build.gradle.kts'
      - '.github/workflows/build.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          echo "🚗 Building Binti2 Debug APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK artifact
        run: |
          # Find the built APK
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          
          echo "Found APK: $APK_PATH"
          
          # Get APK info
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          
          echo "APK Size: $APK_SIZE"
          
          # Copy to project root as app-debug.apk
          cp "$APK_PATH" ./app-debug.apk
          
          echo "✅ APK ready: $(pwd)/app-debug.apk"
          
          # Create build info
          echo "## 📦 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Built At | $(date -u) |" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Success
        run: |
          echo "✅ Build completed successfully!"
          echo ""
          echo "📥 Download the APK from the 'Artifacts' section below."
          echo "📱 Install with: adb install -r app-debug.apk"
