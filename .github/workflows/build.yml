# .github/workflows/build.yml
# Binti2 APK Build Workflow
# Manually triggerable workflow to build app-debug.apk

name: Build Debug APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'app/build.gradle.kts'
      - '.github/workflows/build.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          echo "🚗 Building Binti2 Debug APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename and copy APK
        run: |
          # Find the built APK
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          
          echo "Found APK: $APK_PATH"
          
          # Get APK info
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          APK_NAME=$(basename "$APK_PATH")
          
          echo "APK Size: $APK_SIZE"
          echo "APK Name: $APK_NAME"
          
          # Copy to project root as app-debug.apk
          cp "$APK_PATH" ./app-debug.apk
          
          echo "✅ APK copied to: $(pwd)/app-debug.apk"
          
          # Create build info
          echo "## 📦 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Built At | $(date -u) |" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/apk/
            app/build/outputs/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Success Notification
        run: |
          echo "✅ Build completed successfully!"
          echo ""
          echo "📥 Download the APK from the 'Artifacts' section below."
          echo ""
          echo "🔐 The APK is signed with debug keystore."
          echo "📱 Install with: adb install -r app-debug.apk"

  # Optional: Build release APK if secrets are configured
  release:
    name: Build Release APK
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 -d > app/release-keystore.jks
          echo "Keystore decoded successfully"

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "app/release-keystore.jks" ]; then
            echo "🔐 Building signed release APK..."
            ./gradlew assembleRelease --no-daemon
          else
            echo "⚠️ No keystore found, building unsigned release..."
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # Clean up old artifacts (runs weekly)
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Delete old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '30 days'
          skip-recent: 5
