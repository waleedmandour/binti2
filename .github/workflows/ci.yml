name: Binti CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
  JAVA_VERSION: "17"

jobs:
  # Code Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run ktlint
        run: gradle ktlintCheck
        continue-on-error: true

      - name: Run detekt
        run: gradle detekt
        continue-on-error: true

      - name: Egyptian Arabic Lint
        run: |
          pip install python
          python scripts/lint_arabic_strings.py --dialect egyptian || true
        continue-on-error: true

  # Build APK (directly, without test dependency for alpha)
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: binti-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: binti-release
          path: app/build/outputs/apk/release/*.apk

  # Release on GitHub
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: binti-debug
          path: ./apk

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: ./apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Model Integrity Check
  model-check:
    name: Model Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify model checksums
        run: |
          if [ -f "models/checksums.sha256" ]; then
            sha256sum -c models/checksums.sha256 || echo "Model checksum verification failed"
          else
            echo "No checksum file found, skipping verification"
          fi
