name: Binti CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: binti-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            build.log
          retention-days: 7

      - name: Create Release APK (unsigned)
        run: gradle assembleRelease --no-daemon 2>&1 || echo "Release build requires signing"
        continue-on-error: true

  release:
    name: GitHub Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: binti-debug-apk
          path: ./artifacts

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
