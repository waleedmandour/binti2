# .github/workflows/ci.yml
# Binti2 CI Pipeline - Validation and Testing

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Check project structure
        run: |
          echo "📁 Project Structure Check"
          echo "=========================="
          
          # Check required directories
          for dir in app/src/main/java app/src/main/res app/src/main/assets; do
            if [ -d "$dir" ]; then
              echo "✅ $dir exists"
            else
              echo "❌ $dir missing"
              exit 1
            fi
          done
          
          # Check required files
          for file in app/build.gradle.kts build.gradle.kts settings.gradle.kts; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

      - name: Verify Arabic Strings
        run: |
          echo "📝 String Resources Check"
          echo "========================="
          
          # Check English strings
          if [ -f "app/src/main/res/values/strings.xml" ]; then
            en_count=$(grep -c '<string' app/src/main/res/values/strings.xml || echo "0")
            echo "✅ English strings: $en_count"
          else
            echo "❌ Missing English strings"
            exit 1
          fi
          
          # Check Arabic strings
          if [ -f "app/src/main/res/values-ar/strings.xml" ]; then
            ar_count=$(grep -c '<string' app/src/main/res/values-ar/strings.xml || echo "0")
            echo "✅ Arabic strings: $ar_count"
          else
            echo "⚠️ Missing Arabic strings (recommended)"
          fi

      - name: Model Check
        run: |
          echo "📦 Model Status"
          echo "==============="
          
          if [ -d "app/src/main/assets/models" ]; then
            total_size=$(find app/src/main/assets/models -type f -exec stat -c%s {} + 2>/dev/null | awk '{sum+=$1} END {print sum/1024/1024}')
            if [ -z "$total_size" ] || [ "$total_size" = "0" ]; then
              echo "📱 No bundled models - will download from B2 at runtime"
            else
              echo "📦 Bundled models: ${total_size}MB"
            fi
          else
            echo "📱 No models directory - will download from B2 at runtime"
          fi

  build:
    name: Build
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          echo "🚗 Building Binti2..."
          ./gradlew assembleDebug --no-daemon

      - name: Run Tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: Run Lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Prepare APK
        run: |
          # Find and copy APK
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" ./app-debug.apk
            SIZE=$(du -h ./app-debug.apk | cut -f1)
            
            echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| APK Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.*
          retention-days: 7
          if-no-files-found: ignore

  summary:
    name: Summary
    needs: [validate, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## 🔍 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📱 **Binti2** - Egyptian Arabic Voice Assistant for BYD DiLink" >> $GITHUB_STEP_SUMMARY
