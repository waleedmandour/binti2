name: Binti2 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2
      
    - name: Verify Model Sizes (<1GB total)
      run: |
        if [ -d "app/src/main/assets/models" ]; then
          total_size=$(find app/src/main/assets/models -type f -exec stat -c%s {} + 2>/dev/null | awk '{sum+=$1} END {print sum/1024/1024}')
          if [ -z "$total_size" ]; then
            total_size=0
          fi
          echo "Total model size: ${total_size}MB"
          if (( $(echo "$total_size > 1024" | bc -l) )); then
            echo "❌ Models exceed 1GB limit!"
            exit 1
          fi
          echo "✅ Model sizes OK (${total_size}MB < 1GB limit)"
        else
          echo "⚠️ No models directory found - models will be downloaded at runtime"
        fi
        
    - name: Check Egyptian Arabic Strings
      run: |
        if [ -f "app/src/main/res/values-ar/strings.xml" ]; then
          echo "✅ Egyptian Arabic strings file exists"
          # Check for critical strings
          critical_strings=("app_name" "wake_word" "accessibility_service_description")
          for str in "${critical_strings[@]}"; do
            if grep -q "name=\"$str\"" app/src/main/res/values-ar/strings.xml; then
              echo "✅ Found: $str"
            else
              echo "❌ Missing critical string: $str"
              exit 1
            fi
          done
        else
          echo "❌ Missing values-ar/strings.xml"
          exit 1
        fi
        
    - name: Validate HMS Dependencies
      run: |
        if grep -q "com.huawei.hms" app/build.gradle.kts; then
          echo "✅ HMS dependencies found"
        else
          echo "⚠️ No HMS dependencies - Huawei fallback disabled"
        fi

  build:
    name: Build & Test
    needs: validate
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Run unit tests
      run: ./gradlew test
      
    - name: Run lint
      run: ./gradlew lint
      continue-on-error: true
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

  release:
    name: Build Release APK
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ENCODED_KEYSTORE" ]; then
          echo $ENCODED_KEYSTORE | base64 -d > app/release-keystore.jks
        else
          echo "⚠️ No keystore secret found - using debug signing"
        fi
        
    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -f "app/release-keystore.jks" ]; then
          ./gradlew assembleRelease
        else
          # Build with debug signing if no release keystore
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=debug.keystore
        fi
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  model-pack:
    name: Package Model Assets
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create model manifest
      run: |
        mkdir -p models_release
        cat > models_release/manifest.json << 'EOF'
        {
          "version": "${{ github.event.release.tag_name }}",
          "models": [
            {
              "name": "Wake Word Detector",
              "file": "ya_binti_detector.tflite",
              "size_mb": 5,
              "sha256": "placeholder"
            },
            {
              "name": "Egyptian ASR (Vosk)",
              "file": "vosk-model-egyptian.zip",
              "size_mb": 50,
              "sha256": "placeholder"
            },
            {
              "name": "Intent Classifier",
              "file": "egybert_tiny_int8.tflite",
              "size_mb": 30,
              "sha256": "placeholder"
            },
            {
              "name": "Egyptian TTS Voice",
              "file": "ar-eg-female.zip",
              "size_mb": 80,
              "sha256": "placeholder"
            }
          ],
          "total_size_mb": 165,
          "min_android_sdk": 26,
          "target_android_sdk": 34
        }
        EOF
        
    - name: Upload model manifest
      uses: softprops/action-gh-release@v1
      with:
        files: models_release/manifest.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
